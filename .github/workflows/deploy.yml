name: Deploy website

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [publish-submission]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: TommasoBendinelli/tsENV
          path: _tsENV

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt
      - run: python scripts/sync_hf_to_website_data.py --hf-repo eth-siplab/tsenvbenchmark --tsenv-root _tsENV
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
      - run: python scripts/validate_website_data.py
      - run: rm -rf _tsENV

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
